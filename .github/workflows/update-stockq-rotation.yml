name: Update StockQ Rotation Radar

on:
  workflow_dispatch:
  schedule:
    # 13:00 Asia/Taipei every Sunday, before the Monday fund report.
    - cron: "0 5 * * 0"

permissions:
  contents: write

concurrency:
  group: update-stockq-rotation-radar
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: pip install -e .
      - name: Refresh StockQ market and fund screening
        run: python scripts/update_stockq_rotation.py
      - name: Commit only when radar changed
        run: |
          git add data/market/stockq_rotation
          if git diff --cached --quiet; then
            echo "No StockQ rotation change."
            exit 0
          fi
          git config user.name "onecool-os-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Update StockQ rotation radar"
          git push

