name: Update ETF CTA

on:
  workflow_dispatch:
    inputs:
      allow_bootstrap:
        description: Bootstrap missing GitHub history with Yahoo once
        required: false
        type: boolean
        default: true
      refresh_actions_group:
        description: Refresh one API-safe dividend/split group
        required: false
        type: choice
        options:
          - none
          - group_a
          - group_b
        default: none
  schedule:
    # 06:30 Asia/Taipei, Tuesday-Saturday (22:30 UTC Monday-Friday).
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-etf-cta
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: pip install -e .
      - name: Update histories and CTA
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.allow_bootstrap }}" == "true" ]]; then
            args+=(--allow-bootstrap)
          fi
          # Split corporate-action reconciliation across Thursday and Friday
          # UTC so the nine daily prices plus action calls stay below the
          # Alpha Vantage free daily request limit.
          if [[ "${{ inputs.refresh_actions_group }}" != "" && "${{ inputs.refresh_actions_group }}" != "none" ]]; then
            args+=(--refresh-actions-group "${{ inputs.refresh_actions_group }}")
          elif [[ "${{ github.event_name }}" == "schedule" && "$(date -u +%u)" == "4" ]]; then
            args+=(--refresh-actions-group group_a)
          elif [[ "${{ github.event_name }}" == "schedule" && "$(date -u +%u)" == "5" ]]; then
            args+=(--refresh-actions-group group_b)
          fi
          python scripts/update_etf_cta.py "${args[@]}"
      - name: Commit increment only when market data changed
        run: |
          git add data/market/etf_cta
          if git diff --cached --quiet; then
            echo "No new market data."
            exit 0
          fi
          git config user.name "onecool-os-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Update ETF CTA history"
          git push
