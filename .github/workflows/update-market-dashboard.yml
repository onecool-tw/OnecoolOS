name: Update Market Dashboard

on:
  workflow_dispatch:
  schedule:
    # 06:30 Asia/Taipei every Sunday (22:30 UTC Saturday).
    - cron: "30 22 * * 6"

permissions:
  contents: write

concurrency:
  group: update-market-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project
        run: pip install -e .
      - name: Update Market Dashboard cache
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python scripts/update_market_dashboard.py
      - name: Commit only a complete dashboard update
        run: |
          git add data/market/dashboard
          if git diff --cached --quiet; then
            echo "No new Market Dashboard data."
            exit 0
          fi
          git config user.name "onecool-os-bot"
          git config user.email "actions@users.noreply.github.com"
          git commit -m "Update Market Dashboard"
          git push
