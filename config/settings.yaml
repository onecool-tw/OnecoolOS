app:
  name: Onecool OS
  version: 0.5.0
  timezone: Asia/Taipei
  language: en

database:
  path: data/onecool_os.sqlite3

paths:
  data_dir: data
  cache_dir: data/cache
  logs_dir: logs
  exports_dir: data/exports

runtime:
  debug: false
  environment: production

logging:
  level: INFO

market:
  default_provider: yahoo
  providers:
    yahoo:
      enabled: true
    mock:
      enabled: true
